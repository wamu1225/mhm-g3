    <h1>ストレスへの対処法とリラクセーション技法</h1>
    <p>このモジュールで学ぶこと

ストレスへの気づき方を学んだ次のステップは「どう対処するか」です——このモジュールでは、コーピングの種類・リラクセーション技法・認知行動療法的なアプローチ・生活習慣の整え方など、ストレスを軽減するための具体的な方法を学びます。

コーピング（ストレス対処）の種類

コーピングとは、ストレスを管理・軽減しようとする意識的な努力のことです。大きく2種類に分けられます。

問題焦点型コーピング
ストレッサー（原因）そのものを解決・変更することを目指す対処法。

例：
仕事量が多すぎる → 上司と業務量を交渉する
スキル不足を感じる → 勉強・研修で能力を高める
対人関係の問題 → 相手と話し合い関係を改善する

適している状況： ストレッサー自体を変えられる余地がある場合。

情動焦点型コーピング
ストレスによって生じる不快な感情・気分を和らげることを目指す対処法。
