    <p>このモジュールで学ぶこと

セルフケアの実践ができるようになるには、まず「自分がストレス状態にある」ことに気づく必要があります——このモジュールでは、ストレスへの気づき方・自己評価の方法と、法律で定められたストレスチェック制度について学びます。

ストレスへの気づきの重要性

ストレスは、気づかないまま蓄積すると心身の不調につながります。早期に気づくことがセルフケアの第一歩です。

気づくべきサインは3種類あります。

身体サイン
最近、頭痛・肩こり・胃の不調が続いていないか
睡眠の質が落ちていないか（眠れない・朝起きられない）
食欲の変化（食べられない・食べ過ぎ）はないか
疲れが取れない感覚が続いていないか

心理サイン
物事に集中できない、判断に時間がかかる
些細なことでイライラしたり涙が出たりする
楽しかったことが楽しめなくなった
漠然とした不安・焦りが続いている

行動サイン
