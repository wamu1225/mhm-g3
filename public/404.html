<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>メンタルヘルスマネジメント検定 Ⅲ種 学習リファレンス</title>
    <script>
      // GitHub Pages SPA redirect: unknown paths are caught by 404 and redirected
      // to the root with the path encoded as a query string (?/path/).
      // The main index.html then restores the original URL via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/mhm-g3/?/' +
        l.pathname.slice('/mhm-g3/'.length).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
