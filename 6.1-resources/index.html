    <h1>社内外資源の活用と援助希求</h1>
    <p>このモジュールで学ぶこと

ストレスへの対処法を知っていても、一人では限界があることがあります。「相談できる場所を知っている」こと自体が、最も強力なセルフケアです——このモジュールでは、困ったときに頼れる社内・社外の相談窓口と、プライバシー保護のしくみについて学びます。

援助希求の重要性

援助希求（えんじょきゅう）とは、困難な状況に置かれたとき、周囲や専門家に助けを求める行動のことです。「自分でなんとかしなければならない」という考えがストレスを悪化させることがあります。

 試験ポイント： 援助希求行動は弱さではなく、セルフケアの重要なスキルです。周囲のサポートを活用できる力（ソーシャルサポートの活用）がメンタルヘルスを守ります。

社内の相談資源

産業医

50人以上の事業場で選任が義務付けられている医師。メンタルヘルス不調への対応、ストレスチェックの高ストレス者への面接指導を行い...</p>
