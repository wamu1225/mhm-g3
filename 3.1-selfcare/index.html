    <h1>セルフケアの実践と社内外の相談資源</h1>
    <p>💡 **このモジュールで学ぶこと**

メンタルヘルス不調の知識を持ったところで、次は「では自分はどうすればいいか」というセルフケアの実践を学びます——このモジュールでは、セルフケアの意味・具体的な進め方・困ったときの相談先について解説します。「一人で抱え込まない」ことがセルフケアの本質です。

---

## 1. セルフケアとは何か

**セルフケア**とは、労働者が自分自身のストレスや心の健康状態に気づき、適切に対処するための活動全般です。4つのケアの中でも最も基本となる取り組みで、次の4つの側面から構成されます。

1. **正しい知識を持つ**：メンタルヘルスやストレスに関する基礎知識を学ぶ
2. **自己理解を深める**：自分のストレスサインや傾向を把握する
3. **適切に対処する**：コーピング（後述）を実践する
4. **援助希求行動**：困ったときに相談・受診できる（「助けを求める力」）

🎯 **試験ポイント：** 「援助希求行動」（援助を求める行動）は、弱さではなくセルフケアの重要なスキルです。相談できる人がいることが、ストレスの緩衝材（ソーシャルサポート）...</p>
