    <p>このモジュールで学ぶこと

あなたの職場に、最近元気がなさそうな同僚はいませんか？——職場のメンタルヘルスは、「本人の問題」ではなく、企業全体の生産性や組織の健全性に直結する重要なテーマです。このモジュールでは、なぜメンタルヘルスケアが必要なのか、そして誰がどう関わるのかという「4つのケア」の枠組みを学びます。

メンタルヘルスとは何か

メンタルヘルス（精神的健康）とは、WHO（世界保健機関）の定義によれば、単に「精神疾患がない」というだけでなく、次の3点が満たされた良好な状態を指します。

自分の能力を発揮できること
日常の生活上のストレスに対処できること
生産的に働き、地域に貢献できること

この定義が示すように、メンタルヘルスは「病気か否か」の二択ではなく、日々のパフォーマンスや生活の質（QOL）と密接に結びついています。
