    <h1>ストレスの仕組みとストレス反応</h1>
    <p>💡 **このモジュールで学ぶこと**

前のChapterでメンタルヘルスケアの「枠組み」を学びました。では、そもそも「ストレス」とはどういうメカニズムで起きるのでしょうか？——このモジュールでは、ストレスの定義・発生の仕組み・身体への影響を学びます。仕組みを理解することが、気づきと対処の第一歩です。

---

## 1. ストレスとは何か

「ストレス」は元々工学用語で、物体に力（外力）が加わったときに生じる「ひずみ」のことです。心理学・医学の分野では、**ストレッサー**（原因となる外部の刺激）と、それによって引き起こされる**ストレス反応**（身体・心理・行動の変化）を区別して理解することが重要です。

**ストレッサー（原因）→ 認知的評価（個人の受け取り方）→ ストレス反応（結果）**

この図式が示す通り、同じストレッサーに直面しても、人によってストレス反応の強さが異なります。その間にある「認知的評価」——つまり「これをどう受け取るか」——が大きな個人差を生んでいます。
